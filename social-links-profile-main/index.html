<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  
  <title>Frontend Mentor | Social links profile</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="main-card"> 
    <div class="img">
      <img class="img" src="./assets/images/avatar-jessica.jpeg" alt="Jessica Randall profile picture"></div>
    <div><h1 class="name">
      Jessica Randall</h1></div>
    <div class="location">
        London, United Kingdom</div>
    <div class="descrption">
          "Front-end developer and avid reader."</div>
    <div class="links">      
        <button type="button" name="GitHub" id="github" class="btn github">GitHub</button>
        <button type="button" name="Frontend Mentor" id="frontend-mentor" class="btn frontend-mentor">Frontend Mentor</button>
        <button type="button" name="LinkedIn" id="linkedin" class="btn linkedin">LinkedIn</button>
        <button type="button" name="Twitter" id="twitter" class="btn twitter">Twitter</button>
        <button type="button" name="Instagram" id="instagram" class="btn instagram">Instagram</button>
    </div>
      </main> <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>. 
    Coded by <a href="#">Your Name Here</a>.
  </footer>
</body>
</html>
